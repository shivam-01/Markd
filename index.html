<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markd - Markdown Editor</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='2 7 20 10' fill='none'><path d='M4 15V9l3 3.5L10 9v6' stroke='%2310b981' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/><path d='M17 9v6' stroke='%2310b981' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/><path d='M14 12l3 3 3-3' stroke='%2310b981' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
    <link rel="stylesheet" href="styles.css">
    <script>
        // Load saved title
        const savedTitle = localStorage.getItem('markd-tab-title');
        if (savedTitle) document.title = savedTitle;
        
        // Load saved favicon
        const savedLogoSvg = localStorage.getItem('markd-logo-svg');
        if (savedLogoSvg) {
            const link = document.querySelector('link[rel="icon"]');
            if (link) {
                const encoded = encodeURIComponent(savedLogoSvg);
                link.href = `data:image/svg+xml,${encoded}`;
            }
        }
    </script>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="logo" id="headerLogo">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none">
                    <path d="M4 15V9l3 3.5L10 9v6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M17 9v6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M14 12l3 3 3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>Markd</span>
                <span class="tagline">Clean code. Beautiful docs.</span>
            </div>
            <div class="header-actions">
                <input type="file" id="fileInput" accept=".md,.markdown,.txt" style="display: none;">
                <button class="action-btn" id="openFileBtn" data-tooltip="Open File (Ctrl+O)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                        <line x1="12" y1="11" x2="12" y2="17"/>
                        <polyline points="9,14 12,11 15,14"/>
                    </svg>
                    <span>Open</span>
                </button>
                <button class="action-btn" id="themesBtn" data-tooltip="Browse Themes">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7" rx="1"/>
                        <rect x="14" y="3" width="7" height="7" rx="1"/>
                        <rect x="14" y="14" width="7" height="7" rx="1"/>
                        <rect x="3" y="14" width="7" height="7" rx="1"/>
                    </svg>
                    <span>Themes</span>
                </button>
                <button class="action-btn" id="downloadBtn" data-tooltip="Download Markdown">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7,10 12,15 17,10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    <span>Download</span>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <!-- Editor Panel -->
            <div class="panel editor-panel">
                <div class="panel-header">
                    <span class="panel-title">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                        </svg>
                        Editor
                    </span>
                    <div class="editor-toolbar">
                        <button class="toolbar-btn" id="boldBtn" data-tooltip="Bold (Ctrl+B)">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/>
                                <path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/>
                            </svg>
                        </button>
                        <button class="toolbar-btn" id="italicBtn" data-tooltip="Italic (Ctrl+I)">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="19" y1="4" x2="10" y2="4"/>
                                <line x1="14" y1="20" x2="5" y2="20"/>
                                <line x1="15" y1="4" x2="9" y2="20"/>
                            </svg>
                        </button>
                        <div class="toolbar-divider"></div>
                        <button class="toolbar-btn" id="h1Btn" data-tooltip="Heading 1">H1</button>
                        <button class="toolbar-btn" id="h2Btn" data-tooltip="Heading 2">H2</button>
                        <button class="toolbar-btn" id="h3Btn" data-tooltip="Heading 3">H3</button>
                        <div class="toolbar-divider"></div>
                        <button class="toolbar-btn" id="linkBtn" data-tooltip="Insert Link (Ctrl+K)">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                            </svg>
                        </button>
                        <button class="toolbar-btn" id="imageBtn" data-tooltip="Insert Image">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                <circle cx="8.5" cy="8.5" r="1.5"/>
                                <polyline points="21,15 16,10 5,21"/>
                            </svg>
                        </button>
                        <button class="toolbar-btn" id="codeBtn" data-tooltip="Code Block">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="16,18 22,12 16,6"/>
                                <polyline points="8,6 2,12 8,18"/>
                            </svg>
                        </button>
                        <button class="toolbar-btn" id="inlineCodeBtn" data-tooltip="Inline Code">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="16,18 22,12 16,6"/>
                                <polyline points="8,6 2,12 8,18"/>
                                <line x1="12" y1="2" x2="12" y2="22"/>
                            </svg>
                        </button>
                        <button class="toolbar-btn" id="quoteBtn" data-tooltip="Blockquote">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V21z"/>
                                <path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3z"/>
                            </svg>
                        </button>
                        <div class="toolbar-divider"></div>
                        <button class="toolbar-btn" id="ulBtn" data-tooltip="Unordered List">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="8" y1="6" x2="21" y2="6"/>
                                <line x1="8" y1="12" x2="21" y2="12"/>
                                <line x1="8" y1="18" x2="21" y2="18"/>
                                <circle cx="4" cy="6" r="1" fill="currentColor"/>
                                <circle cx="4" cy="12" r="1" fill="currentColor"/>
                                <circle cx="4" cy="18" r="1" fill="currentColor"/>
                            </svg>
                        </button>
                        <button class="toolbar-btn" id="olBtn" data-tooltip="Ordered List">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="10" y1="6" x2="21" y2="6"/>
                                <line x1="10" y1="12" x2="21" y2="12"/>
                                <line x1="10" y1="18" x2="21" y2="18"/>
                                <text x="3" y="7" font-size="6" fill="currentColor" stroke="none">1</text>
                                <text x="3" y="13" font-size="6" fill="currentColor" stroke="none">2</text>
                                <text x="3" y="19" font-size="6" fill="currentColor" stroke="none">3</text>
                            </svg>
                        </button>
                        <button class="toolbar-btn" id="taskBtn" data-tooltip="Task List">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="5" width="6" height="6" rx="1"/>
                                <path d="M5 11l1.5 1.5L9 9"/>
                                <line x1="12" y1="8" x2="21" y2="8"/>
                                <rect x="3" y="14" width="6" height="6" rx="1"/>
                                <line x1="12" y1="17" x2="21" y2="17"/>
                            </svg>
                        </button>
                        <div class="toolbar-divider"></div>
                        <button class="toolbar-btn" id="tableBtn" data-tooltip="Insert Table">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2"/>
                                <line x1="3" y1="9" x2="21" y2="9"/>
                                <line x1="3" y1="15" x2="21" y2="15"/>
                                <line x1="9" y1="3" x2="9" y2="21"/>
                                <line x1="15" y1="3" x2="15" y2="21"/>
                            </svg>
                        </button>
                        <button class="toolbar-btn" id="hrBtn" data-tooltip="Horizontal Rule">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="3" y1="12" x2="21" y2="12"/>
                            </svg>
                        </button>
                        <button class="toolbar-btn" id="collapseBtn" data-tooltip="Collapsible Section">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="6,9 12,15 18,9"/>
                            </svg>
                        </button>
                        <button class="toolbar-btn" id="mathBtn" data-tooltip="Math Equation (LaTeX)">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <text x="4" y="17" font-size="14" font-style="italic" fill="currentColor" stroke="none">∑</text>
                            </svg>
                        </button>
                        <div class="toolbar-divider"></div>
                        <button class="toolbar-btn" id="resetBtn" data-tooltip="Reset Editor">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                                <path d="M3 3v5h5"/>
                            </svg>
                        </button>
                        <span class="word-count" id="wordCount">0 words</span>
                    </div>
                </div>
                <textarea id="editor" class="editor" placeholder="Start writing your markdown here...

# Welcome to Markd

This is a **modern** markdown editor with *live preview*.

## Features
- Real-time preview
- Syntax highlighting
- Dark/Light theme
- Export to file

Happy writing! ✨"></textarea>
            </div>

            <!-- Resizer -->
            <div class="resizer" id="resizer">
                <div class="resizer-handle"></div>
            </div>

            <!-- Preview Panel -->
            <div class="panel preview-panel" id="previewPanel">
                <div class="panel-header">
                    <span class="panel-title">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        Preview
                    </span>
                    <button class="fullscreen-btn" id="fullscreenBtn" data-tooltip="Toggle Fullscreen">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="expand-icon">
                            <polyline points="15 3 21 3 21 9"/>
                            <polyline points="9 21 3 21 3 15"/>
                            <line x1="21" y1="3" x2="14" y2="10"/>
                            <line x1="3" y1="21" x2="10" y2="14"/>
                        </svg>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="collapse-icon">
                            <polyline points="4 14 10 14 10 20"/>
                            <polyline points="20 10 14 10 14 4"/>
                            <line x1="14" y1="10" x2="21" y2="3"/>
                            <line x1="3" y1="21" x2="10" y2="14"/>
                        </svg>
                    </button>
                </div>
                <div id="preview" class="preview markdown-body"></div>
            </div>
    </main>
    </div>

    <!-- Theme Modal -->
    <div class="theme-modal-overlay" id="themeModal">
        <div class="theme-modal">
            <div class="theme-modal-header">
                <span>Select Theme...</span>
            </div>
            <div class="theme-modal-content">
                <div class="theme-list">
                    <div class="theme-item" data-theme="midnight">Midnight Blue</div>
                    <div class="theme-item" data-theme="dracula">Dracula</div>
                    <div class="theme-item" data-theme="catppuccin-mocha">Catppuccin Mocha</div>
                    <div class="theme-item" data-theme="onedark">One Dark</div>
                    <div class="theme-item" data-theme="monokai">Monokai Pro</div>
                    <div class="theme-item" data-theme="github-dark">GitHub Dark</div>
                    <div class="theme-item" data-theme="onelight">One Light</div>
                    <div class="theme-item" data-theme="github-light">GitHub Light</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>

    <script src="app.js"></script>
</body>
</html>
